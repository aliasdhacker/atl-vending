quarkus.application.name=atl-vending

# Lab 04 — Type-safe configuration + profiles (atl.vending.*)
atl.vending.max-restock-quantity=200
atl.vending.currency=USD
atl.vending.restock-threshold=5

%dev.atl.vending.max-restock-quantity=500
%test.atl.vending.max-restock-quantity=10
%prod.atl.vending.max-restock-quantity=100

%dev.quarkus.log.category."co.atlvending".level=DEBUG
%prod.quarkus.log.level=INFO

# Lab 05 — Persistence (Hibernate ORM + Panache). Dev & test use Dev Services
# (a throwaway Postgres container on Podman); no datasource URL needed.
%dev.quarkus.hibernate-orm.database.generation=drop-and-create
%dev.quarkus.hibernate-orm.log.sql=true
%test.quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.datasource.devservices.image-name=postgres:16-alpine
