quarkus.application.name=atl-vending

# ─────────────────────────────────────────────────────────────
# Lab 04 — Type-safe configuration + profiles (atl.vending.*)
# ─────────────────────────────────────────────────────────────
atl.vending.max-restock-quantity=200
atl.vending.currency=USD
atl.vending.restock-threshold=5

%dev.atl.vending.max-restock-quantity=500
%test.atl.vending.max-restock-quantity=10
%prod.atl.vending.max-restock-quantity=100

%dev.quarkus.log.category."co.atlvending".level=DEBUG
%prod.quarkus.log.level=INFO

# ─────────────────────────────────────────────────────────────
# Lab 05/06 — Persistence (Hibernate ORM + Panache). Dev & test use
# Dev Services (a throwaway Postgres container); no datasource URL needed.
# ─────────────────────────────────────────────────────────────
%dev.quarkus.hibernate-orm.database.generation=drop-and-create
%dev.quarkus.hibernate-orm.log.sql=true
%test.quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.datasource.devservices.image-name=postgres:16-alpine

# ─────────────────────────────────────────────────────────────
# Lab 08 — Kafka channels (Dev Services provides a Redpanda broker)
# ─────────────────────────────────────────────────────────────
mp.messaging.outgoing.sales-out.connector=smallrye-kafka
mp.messaging.outgoing.sales-out.topic=sales
mp.messaging.outgoing.sales-out.value.serializer=io.quarkus.kafka.client.serialization.ObjectMapperSerializer

mp.messaging.incoming.sales-in.connector=smallrye-kafka
mp.messaging.incoming.sales-in.topic=sales
mp.messaging.incoming.sales-in.auto.offset.reset=earliest
mp.messaging.incoming.sales-in.value.deserializer=co.atlvending.messaging.SaleEventDeserializer

mp.messaging.outgoing.restock-out.connector=smallrye-kafka
mp.messaging.outgoing.restock-out.topic=restock-alerts
mp.messaging.outgoing.restock-out.value.serializer=io.quarkus.kafka.client.serialization.ObjectMapperSerializer

mp.messaging.incoming.restock-in.connector=smallrye-kafka
mp.messaging.incoming.restock-in.topic=restock-alerts
mp.messaging.incoming.restock-in.auto.offset.reset=earliest
mp.messaging.incoming.restock-in.value.deserializer=co.atlvending.messaging.RestockAlertDeserializer

# ─────────────────────────────────────────────────────────────
# Lab 09 — Security with JWT
# ─────────────────────────────────────────────────────────────
mp.jwt.verify.publickey.location=publicKey.pem
mp.jwt.verify.issuer=https://atl-vending/issuer
mp.jwt.verify.clock.skew=30
# Private key used ONLY by the dev/test /dev/token helper endpoint:
smallrye.jwt.sign.key.location=privateKey.pem

# ─────────────────────────────────────────────────────────────
# Lab 10 — Observability
#   Micrometer /q/metrics and SmallRye Health /q/health are on by default.
#   OpenTelemetry tracing is present (@WithSpan works) but export is disabled
#   so the app never blocks trying to reach a collector that isn't running.
#   To demo Jaeger, set quarkus.otel.sdk.disabled=false and point the
#   OTLP endpoint at a running collector.
# ─────────────────────────────────────────────────────────────
quarkus.otel.sdk.disabled=true

# ─────────────────────────────────────────────────────────────
# Lab 11 — Container image (Jib) + Kubernetes manifests
#   Jib builds an image with NO Docker/Podman daemon required.
#   Native builds use Podman as the in-container build runtime.
# ─────────────────────────────────────────────────────────────
quarkus.container-image.builder=jib
quarkus.container-image.group=atlvending
quarkus.container-image.name=atl-vending
quarkus.container-image.tag=lab-11
quarkus.native.container-runtime=podman
quarkus.docker.executable-name=podman

quarkus.kubernetes.replicas=2
quarkus.kubernetes.ingress.expose=true
quarkus.kubernetes.ingress.host=atl-vending.local
