# Testcontainers configuration for running Quarkus Dev Services on PODMAN.
#
# NOTE: Ryuk (the Testcontainers reaper container) does NOT run reliably under
# rootless Podman. It can only be disabled via the environment variable
# TESTCONTAINERS_RYUK_DISABLED=true (Testcontainers ignores `ryuk.disabled` in
# this file). That variable is set for you in three places so every workflow is
# covered:
#   - Maven test/verify : maven-surefire/failsafe <environmentVariables> in pom.xml
#   - Gradle test/build : tasks.withType(Test) { environment ... } in build.gradle
#   - Dev mode & IDE     : a persistent user environment variable on this machine
#
# Container-runtime discovery: with `podman machine` running, Podman forwards the
# Docker API on \\.\pipe\docker_engine, which Testcontainers finds automatically.
# If discovery ever fails, uncomment the matching line below:
#   docker.host=npipe:////./pipe/docker_engine                 # Windows (Podman)
#   docker.host=unix:///run/user/1000/podman/podman.sock       # Linux (rootless)

testcontainers.reuse.enable=false
