# Testcontainers / Quarkus Dev Services configuration.
#
# This project runs its Dev Services (Postgres, Kafka) on PODMAN, not Docker.
# Rootless Podman cannot run the Ryuk resource-reaper container reliably
# (you'll see "Can not connect to Ryuk ... Connection refused"), so disable it.
# Quarkus Dev Services shut their own containers down, so Ryuk isn't needed.
ryuk.disabled=true

# Skip Testcontainers' Docker-environment start-up checks (they add noise and
# occasionally misfire against Podman). Not required, but makes start-up cleaner.
checks.disable=true

# Container runtime discovery:
#   On this Windows machine, `podman machine start` forwards the Docker API on
#   the default \\.\pipe\docker_engine pipe, so no docker.host is needed.
#   If discovery ever fails, point Testcontainers at Podman explicitly:
#     Windows:  docker.host=npipe:////./pipe/docker_engine
#     Linux:    docker.host=unix:///run/user/1000/podman/podman.sock
